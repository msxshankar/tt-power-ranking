<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Vibrant red gradient for the paddle face -->
    <linearGradient id="paddleFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4b4b" />
      <stop offset="100%" stop-color="#b80000" />
    </linearGradient>
    
    <!-- Wooden handle gradient -->
    <linearGradient id="paddleHandle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="50%" stop-color="#ca8a04" />
      <stop offset="100%" stop-color="#854d0e" />
    </linearGradient>
    
    <!-- Shiny 3D gradient for the ping-pong ball -->
    <radialGradient id="pingPongBall" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#fffbeb" />
      <stop offset="100%" stop-color="#f59e0b" />
    </radialGradient>
  </defs>

  <!-- Paddle Handle -->
  <rect x="14" y="19" width="4" height="11" rx="1" fill="url(#paddleHandle)" />
  
  <!-- Paddle Outer Rim/Rubber -->
  <circle cx="16" cy="12" r="10" fill="url(#paddleFace)" stroke="#ffffff" stroke-width="0.8" />
  
  <!-- Paddle Highlight overlay -->
  <path d="M 9.5 7.5 A 10 10 0 0 1 22.5 7.5" fill="none" stroke="rgba(255, 255, 255, 0.25)" stroke-width="1" stroke-linecap="round" />

  <!-- Ping Pong Ball (overlapping the bottom right of the paddle) -->
  <circle cx="23" cy="21" r="3.5" fill="url(#pingPongBall)" stroke="#ca8a04" stroke-width="0.4" />
</svg>
